run:
  name: baseline
  out_subdir: 03_baseline

train:
  backbone: radimagenet_resnet50  # medikal pretrain; weights/radimagenet_resnet50.pth gerekli. ImageNet ablation: tf_efficientnetv2_s.in21k_ft_in1k
  pretrained: true
  image_size: 384
  batch_size: 32
  epochs: 60
  warmup_epochs: 3
  backbone_lr: 3.0e-5
  head_lr: 3.0e-4
  weight_decay: 1.0e-4
  loss: asymmetric     # bce | asymmetric
  bootstrapped_asl: true  # warmup_epochs + 2 sonrası BootstrappedASL'e geçer
  dropout: 0.3
  ema_decay: 0.999
  patience: 15
  train_transform: baseline   # baseline | traditional
  weighted_sampler: false
  synth_mix: null
